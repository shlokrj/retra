# Render blueprint for the Retra backend (the frontend deploys on Vercel).
# Set RETRA_MODEL_URL in the Render dashboard to a public URL for retra.pth
# (e.g. a GitHub release asset); the backend downloads it on startup.

services:
  - type: web
    name: retra-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: RETRA_MODEL_URL
        sync: false
